name: IAAuto
version: 1.0.0
main: com.iaauto.IAAutoPlugin
api-version: '1.20.6'
description: Packages and pushes ItemsAdder generated.zip through local git.
author: IAAuto

commands:
  iaauto:
    description: Runs IAAuto commands.
    usage: /iaauto <start|push|reload>

permissions:
  iaauto.start:
    description: Allows /iaauto start.
    default: op
  iaauto.push:
    description: Allows /iaauto push.
    default: op
  iaauto.reload:
    description: Allows /iaauto reload.
    default: op
