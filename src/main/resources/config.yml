language: "en" # Supported: en, zh_cn

git:
  # How commits are submitted. Supported: "git" or "github-cli".
  # "git" uses your existing git authentication.
  # "github-cli" starts `gh auth login --web` automatically when needed, sends the verification output
  # to the command sender and console, then runs `gh auth setup-git` before pushing.
  submit-method: "git"

  # Local git executable. Keep "git" when git is already on the server PATH.
  executable: "git"

  # Local GitHub CLI executable. Used only when submit-method is "github-cli".
  github-cli-executable: "gh"

  # HTTPS or SSH URL of the GitHub repository.
  # Example HTTPS: https://github.com/owner/repository.git
  # Example SSH: git@github.com:owner/repository.git
  remote-url: ""

  # Branch to commit and push to.
  branch: "main"

  # Relative paths are resolved from the Minecraft server root.
  # repository-directory is managed by NekoAutoPack; unpublished local commits may be reset before pushing.
  source-file: "plugins/ItemsAdder/output/generated.zip"
  repository-directory: "plugins/NekoAutoPack/repository"
  repository-file: "generated.zip"

  commit-message: "Update ItemsAdder generated.zip"
  timeout-seconds: 120

  # Optional per-repository commit identity. Leave blank to use local/global git config.
  author:
    name: ""
    email: ""

  # Optional git proxy settings. Leave blank to use the server environment.
  # Supports URLs such as http://127.0.0.1:7890 or socks5://127.0.0.1:1080.
  proxy:
    http: ""
    https: ""
    no-proxy: ""

start:
  # Command run by /nap start before pushing. Do not include the leading slash.
  pack-command: "iazip"

  # Delay after /iazip before /nap push starts. Increase this for larger packs.
  push-delay-seconds: 10

  # After /iazip, wait until generated.zip has actually refreshed before pushing.
  source-refresh-timeout-seconds: 120

  # Once refreshed, require generated.zip metadata to stay unchanged for this long.
  source-stable-seconds: 2
  source-poll-interval-millis: 500
